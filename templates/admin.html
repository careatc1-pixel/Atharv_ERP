<div class="row g-3 mb-4 border-bottom pb-4">
    <div class="col-md-5">
        <label class="form-label fw-bold">Select Client</label>
        <select name="client_id" class="form-select form-select-sm shadow-sm">
            {% for c in clients %}<option value="{{c.id}}">{{c.company}}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label fw-bold">GST Slab (%)</label>
        <select name="gst_rate" class="form-select form-select-sm shadow-sm text-primary fw-bold">
            <option value="0">0% (Nil Rated)</option>
            <option value="5">5% (Essentials)</option>
            <option value="12">12% (Standard)</option>
            <option value="18" selected>18% (Services/Standard)</option>
            <option value="28">28% (Luxury)</option>
        </select>
    </div>
    <div class="col-md-2">
        <label class="form-label fw-bold">Discount</label>
        <input type="number" name="discount" class="form-control form-control-sm" value="0">
    </div>
</div>
