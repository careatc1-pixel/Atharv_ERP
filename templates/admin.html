<!DOCTYPE html>
<html>
<head>
    <title>ATC Billing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; padding: 40px; font-family: sans-serif; }
        .card { border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 15px; }
        .btn-primary { background: #003366; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between mb-4">
            <h3>Professional Billing Center</h3>
            <a href="/logout" class="btn btn-sm btn-outline-danger">Logout</a>
        </div>

        <div class="card p-4 mb-4">
            <form action="/create-invoice" method="POST">
                <div class="row g-3 mb-4">
                    <div class="col-md-5"><input type="text" name="client_name" class="form-control" placeholder="Client/Company Name" required></div>
                    <div class="col-md-4"><input type="text" name="gst_no" class="form-control" placeholder="Client GSTIN"></div>
                    <div class="col-md-3">
                        <select name="gst_rate" class="form-select">
                            <option value="0">0% GST</option>
                            <option value="5">5% GST</option>
                            <option value="12">12% GST</option>
                            <option value="18" selected>18% GST</option>
                            <option value="28">28% GST</option>
                        </select>
                    </div>
                </div>

                <div id="items">
                    <div class="row g-2 mb-2">
                        <div class="col-md-9"><input type="text" name="service[]" class="form-control" placeholder="Description" required></div>
                        <div class="col-md-3"><input type="number" name="price[]" class="form-control" placeholder="Price" required></div>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-secondary mt-2 mb-4" onclick="add()">+ Add More</button>
                <button class="btn btn-primary w-100 py-2">Generate & Download Invoice PDF</button>
            </form>
        </div>

        <h5>Recent Invoices</h5>
        <div class="card p-2">
            <table class="table">
                <thead><tr><th>Inv No</th><th>Client</th><th>Total</th><th>Action</th></tr></thead>
                <tbody>
                    {% for i in invoices %}
                    <tr><td>{{i.inv_no}}</td><td>{{i.client_name}}</td><td>Rs. {{i.total_amt}}</td>
                        <td><a href="/download/{{i.id}}" class="btn btn-sm btn-danger">Download PDF</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function add() {
            const div = document.createElement('div'); div.className = 'row g-2 mb-2';
            div.innerHTML = '<div class="col-md-9"><input type="text" name="service[]" class="form-control" placeholder="Description" required></div><div class="col-md-3"><input type="number" name="price[]" class="form-control" placeholder="Price" required></div>';
            document.getElementById('items').appendChild(div);
        }
    </script>
</body>
</html>
