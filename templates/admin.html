<div class="card p-3 mb-3">
    <h6 class="mb-3 text-primary">Manual Client Registration</h6>
    <form action="/add-client" method="POST" class="row g-2">
        <div class="col-md-4">
            <label class="fw-bold text-muted">Company Name*</label>
            <input type="text" name="company" class="form-control form-control-sm" placeholder="e.g. Atharv Tech Co." required>
        </div>
        <div class="col-md-4">
            <label class="fw-bold text-muted">Contact Person</label>
            <input type="text" name="name" class="form-control form-control-sm" placeholder="Owner/Manager Name">
        </div>
        <div class="col-md-4">
            <label class="fw-bold text-muted">Email Address</label>
            <input type="email" name="email" class="form-control form-control-sm" placeholder="care.atc1@gmail.com">
        </div>
        <div class="col-md-4">
            <label class="fw-bold text-muted">Contact No.</label>
            <input type="text" name="contact" class="form-control form-control-sm" placeholder="+91-0000000000">
        </div>
        <div class="col-md-4">
            <label class="fw-bold text-muted">GSTIN</label>
            <input type="text" name="gst" class="form-control form-control-sm" placeholder="22AAAAA0000A1Z5">
        </div>
        <div class="col-md-4">
            <label class="fw-bold text-muted">Full Address</label>
            <input type="text" name="address" class="form-control form-control-sm" placeholder="City, State, Pincode">
        </div>
        <div class="col-12 mt-3">
            <button type="submit" class="btn btn-sm btn-primary w-100 shadow-sm">Save Client Details</button>
        </div>
    </form>
</div>
