<div class="tab-pane fade" id="t-bill">
    <h5 class="mb-4 fw-bold text-primary">Professional Billing Center</h5>
    <div class="card p-4">
        <form action="/create-invoice" method="POST">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="fw-bold small">Client Selection</label>
                    <select name="client_id" class="form-select form-select-sm shadow-sm">
                        {% for c in clients %}<option value="{{c.id}}">{{c.company}}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="fw-bold small">GST Slab (%)</label>
                    <select name="gst_rate" class="form-select form-select-sm text-primary fw-bold">
                        <option value="0">0% (Nil)</option>
                        <option value="5">5%</option>
                        <option value="12">12%</option>
                        <option value="18" selected>18% (Standard)</option>
                        <option value="28">28%</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="fw-bold small">Discount (Rs)</label>
                    <input type="number" name="discount" class="form-control form-control-sm" value="0">
                </div>
            </div>
            
            <div id="service-list">
                <div class="row g-2 mb-2">
                    <div class="col-md-8"><input type="text" name="service[]" class="form-control form-control-sm" placeholder="Service Description" required></div>
                    <div class="col-md-3"><input type="number" name="price[]" class="form-control form-control-sm" placeholder="Price" required></div>
                </div>
            </div>
            <button type="button" class="btn btn-xs btn-outline-secondary mt-1 mb-3" onclick="addRow()">+ Add More Items</button>
            
            <div class="mb-3">
                <label class="fw-bold small">Narration / Payment Terms</label>
                <textarea name="narration" class="form-control form-control-sm" rows="2" placeholder="e.g. Validity 30 days, Payment via UPI..."></textarea>
            </div>
            
            <button class="btn btn-sm btn-success w-100 py-2 shadow-sm">Generate & Download Invoice</button>
        </form>
    </div>
</div>
