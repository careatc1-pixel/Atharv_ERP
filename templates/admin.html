<div class="tab-pane fade show active" id="t-client">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0 text-navy">Client Management</h4>
        <div class="d-flex">
            <a href="/export-clients" class="btn btn-sm btn-outline-success me-2 border-2">
                <i class="fas fa-file-excel me-1"></i> Export Master
            </a>
            <form action="/bulk-upload" method="POST" enctype="multipart/form-data" class="d-flex bg-white p-1 rounded border">
                <input type="file" name="file" class="form-control form-control-sm border-0" style="width: 180px;" required>
                <button class="btn btn-sm btn-dark"><i class="fas fa-sync me-1"></i> Bulk Sync</button>
            </form>
        </div>
    </div>
    
    <div class="card p-4 mb-4">
        <h6 class="text-primary mb-3 font-weight-bold">Add New Client Manually</h6>
        <form action="/add-client" method="POST" class="row g-3">
            <div class="col-md-4"><input type="text" name="company" class="form-control form-control-sm" placeholder="Company Name*" required></div>
            <div class="col-md-4"><input type="text" name="name" class="form-control form-control-sm" placeholder="Contact Person"></div>
            <div class="col-md-4"><input type="email" name="email" class="form-control form-control-sm" placeholder="Email"></div>
            <div class="col-md-3"><input type="text" name="contact" class="form-control form-control-sm" placeholder="Phone"></div>
            <div class="col-md-3"><input type="text" name="gst" class="form-control form-control-sm" placeholder="GSTIN"></div>
            <div class="col-md-6"><input type="text" name="address" class="form-control form-control-sm" placeholder="Address"></div>
            <div class="col-12"><button class="btn btn-sm btn-primary px-4 shadow-sm">Save Client</button></div>
        </form>
    </div>
    
    <div class="card overflow-hidden">
        <div class="card-header fw-bold text-muted">REGISTERED CLIENT DIRECTORY</div>
        <table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>#</th><th>Company</th><th>Person</th><th>GSTIN</th><th>Email</th></tr></thead>
            <tbody>{% for c in clients %}<tr><td>{{loop.index}}</td><td><strong>{{c.company}}</strong></td><td>{{c.name}}</td><td><code>{{c.gstin}}</code></td><td>{{c.email}}</td></tr>{% endfor %}</tbody>
        </table>
    </div>
</div>
