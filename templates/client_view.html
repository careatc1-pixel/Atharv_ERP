<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard | Atharv Tech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card p-5 shadow border-0" style="border-radius: 20px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Welcome, {{ client.name }}</h2>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
            <hr>
            <h4>Project: {{ client.project_name }}</h4>
            <label class="mt-3">Work Progress:</label>
            <div class="progress mt-2" style="height: 30px;">
                <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: {{client.progress}}%">{{client.progress}}%</div>
            </div>
            <div class="row mt-5 text-center">
                <div class="col-md-6"><div class="p-3 bg-white border rounded">Total Bill: <h5>Rs. {{ (client.total_bill * 1.18)|round(2) }}</h5></div></div>
                <div class="col-md-6"><div class="p-3 bg-success text-white border rounded">Paid: <h5>Rs. {{ client.paid_amount }}</h5></div></div>
            </div>
        </div>
    </div>
</body>
</html>
