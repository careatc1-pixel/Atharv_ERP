<!DOCTYPE html>
<html>
<head>
    <title>Project Status - Atharv Tech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="card mx-auto shadow" style="max-width: 600px; border-radius: 20px;">
            <div class="card-body p-5">
                <h2 class="text-center text-primary mb-4">Project Status</h2>
                <h4>Hi, {{ client.name }}</h4>
                <p class="text-muted">Aapke project ka current status neeche diya gaya hai:</p>
                <hr>
                <h5>Project: {{ client.project_name }}</h5>
                <div class="progress my-4" style="height: 25px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: {{client.progress}}%">{{client.progress}}%</div>
                </div>
                <div class="row mt-4">
                    <div class="col-6"><p class="mb-0">Total Bill:</p><h3>₹{{client.total_bill}}</h3></div>
                    <div class="col-6 text-right"><p class="mb-0 text-success">Total Paid:</p><h3 class="text-success">₹{{client.paid_amount}}</h3></div>
                </div>
                <a href="/" class="btn btn-secondary btn-block mt-4">Back to Search</a>
            </div>
        </div>
    </div>
</body>
</html>
