<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharv Tech Co. ERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .main-card { border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 main-card bg-white p-0 row">
                <div class="col-md-6 bg-primary text-white p-5 d-flex flex-column justify-content-center text-center">
                    <h1 class="display-4 font-weight-bold">Atharv Tech Co.</h1>
                    <p class="lead">Billing & Project Tracking ERP</p>
                    <a href="/admin" class="btn btn-outline-light mt-4 btn-lg">Admin Login</a>
                </div>
                <div class="col-md-6 p-5">
                    <h3 class="mb-4 text-dark">Client Portal</h3>
                    <p class="text-muted small">Apne project ka status dekhne ke liye email dalkar search karein.</p>
                    <form action="/client-check" method="POST">
                        <div class="form-group">
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="yourname@email.com" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-block btn-lg shadow">Track My Project</button>
                    </form>
                    <div class="mt-4 text-center">
                        <small class="text-muted">© 2026 Atharv Tech Co. | Established 2023</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
