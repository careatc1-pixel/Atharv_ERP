<!DOCTYPE html>
<html lang="en">
<head>
    <title>Atharv Tech Co. | Client Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); height: 100vh; display: flex; align-items: center; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card shadow-lg">
                    <h2 class="mb-2 font-weight-bold">Atharv Tech Co.</h2>
                    <p class="text-info mb-4 small text-uppercase tracking-widest">Client Service Portal</p>
                    <form action="/client-login" method="POST">
                        <input type="email" name="email" class="form-control mb-3 bg-transparent text-white border-secondary" placeholder="Enter Your Registered Email" required>
                        <button type="submit" class="btn btn-info w-100 py-2">View My Project Status</button>
                    </form>
                    <hr class="my-4 opacity-25">
                    <a href="/login" class="text-white-50 text-decoration-none small">Admin/Staff Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
