<!DOCTYPE html>
<html>
<head>
    <title>Atharv Tech Co. | Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background: #1a1a2e; height: 100vh; display: flex; align-items: center; color: white; }</style>
</head>
<body>
    <div class="container text-center">
        <div class="card p-5 bg-dark border-secondary shadow-lg mx-auto" style="max-width: 450px;">
            <h2 class="text-info mb-4">Atharv Tech Co.</h2>
            <form action="/client-login" method="POST">
                <input type="email" name="email" class="form-control mb-3" placeholder="Client Email" required>
                <button type="submit" class="btn btn-info w-100 mb-3">Login to Dashboard</button>
            </form>
            <a href="/login" class="text-muted small">Admin Login</a>
        </div>
    </div>
</body>
</html>
