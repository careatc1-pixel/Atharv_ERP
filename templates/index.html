<!DOCTYPE html>
<html lang="en">
<head>
    <title>Atharv Tech Co. ERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-5 font-weight-bold text-primary">Atharv Tech Co. Portal</h1>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-custom p-4 bg-white">
                    <h4 class="mb-4">Client Login</h4>
                    <form action="/client-login" method="POST">
                        <input type="email" name="email" class="form-control mb-3" placeholder="Registered Email ID" required>
                        <button type="submit" class="btn btn-success btn-block">Login to My Dashboard</button>
                    </form>
                    <hr>
                    <a href="/login" class="btn btn-outline-dark btn-sm mt-2">Staff/Admin Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
