<!DOCTYPE html>
<html>
<head>
    <title>Staff Login | Atharv Tech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f3460; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { width: 350px; background: white; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="box shadow">
        <h4 class="text-center mb-4">Admin Access</h4>
        <form action="/login" method="POST">
            <div class="mb-3"><label class="small">Email</label><input type="email" name="email" class="form-control" required></div>
            <div class="mb-3"><label class="small">Password</label><input type="password" name="password" class="form-control" required></div>
            <button type="submit" class="btn btn-primary w-100 mt-2">Sign In</button>
            <a href="/" class="btn btn-link btn-sm d-block text-center mt-3">Back to Client Portal</a>
        </form>
    </div>
</body>
</html>
