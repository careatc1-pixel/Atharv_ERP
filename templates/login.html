<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Atharv Tech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background: #343a40; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; background: white; padding: 30px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg">
        <h3 class="text-center mb-4">Atharv Tech Admin</h3>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="care.atc1@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-4">Login Now</button>
            <a href="/" class="btn btn-link btn-sm btn-block mt-2">Back to Home</a>
        </form>
    </div>
</body>
</html>
